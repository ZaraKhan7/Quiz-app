<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: system-ui, Arial;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #1e293b, #0b1220, #020617);
    }

    .card {
        width: 420px;
        padding: 25px;
        border-radius: 20px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        backdrop-filter: blur(20px);
        box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        text-align: center;
    }

    .title {
        font-size: 18px;
        color: #38bdf8;
        margin-bottom: 10px;
        font-weight: bold;
    }

    .progress {
        width: 100%;
        height: 8px;
        background: rgba(255,255,255,0.1);
        border-radius: 20px;
        overflow: hidden;
        margin-bottom: 20px;
    }

    .bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #38bdf8, #a78bfa, #22c55e);
        transition: 0.3s;
    }

    /* QUESTION */
    .question {
        font-size: 20px;
        font-weight: 600;
        color: #e5e7eb;
        margin-bottom: 18px;
    }

    .options button {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.05);
        color: white;
        cursor: pointer;
        transition: 0.25s;
        font-size: 15px;
    }

    .options button:hover {
        transform: scale(1.03);
        background: rgba(56,189,248,0.15);
        border-color: #38bdf8;
    }

    /* STATES */
    .correct {
        background: linear-gradient(90deg, #22c55e, #16a34a) !important;
        border: none;
    }

    .wrong {
        background: linear-gradient(90deg, #ef4444, #dc2626) !important;
        border: none;
    }

    .footer {
        margin-top: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .score {
        color: #22c55e;
        font-weight: bold;
    }

    .btn {
        padding: 8px 14px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: linear-gradient(90deg, #38bdf8, #a78bfa);
        color: black;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(56,189,248,0.4);
    }

</style>
</head>

<body>

<div class="card">

    <div class="title">🔥 Quiz Challenge</div>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <div class="question" id="q">Loading...</div>

    <div class="options" id="options"></div>

    <div class="footer">
        <div class="score" id="score">Score: 0</div>
        <button class="btn" onclick="restart()">Restart</button>
    </div>

</div>

<script>
const data = [
    {q:"DOM stands for?", o:["Data Object Model","Document Object Model","Digital Object Model","None"], a:"Document Object Model"},
    {q:"JS runs in?", o:["Browser","Server","Cloud","Kernel"], a:"Browser"},
    {q:"Variable keyword?", o:["var","int","string","define"], a:"var"},
    {q:"Array symbol?", o:["[]","{}","()","<>"], a:"[]"},
    {q:"CSS used for?", o:["Styling","Logic","Database","API"], a:"Styling"},
    {q:"HTML full form?", o:["Hyper Text Markup Language","None","High Text","Markup"], a:"Hyper Text Markup Language"},
    {q:"JS extension?", o:[".js",".css",".html",".java"], a:".js"},
    {q:"Loop keyword?", o:["for","if","var","let"], a:"for"},
    {q:"DOM is part of?", o:["HTML","CSS","JS","All"], a:"HTML"},
    {q:"JS created by?", o:["Netscape","Google","Microsoft","Apple"], a:"Netscape"}
];

let i = 0;
let score = 0;

const q = document.getElementById("q");
const opt = document.getElementById("options");
const bar = document.getElementById("bar");
const scoreEl = document.getElementById("score");

function load(){
    let d = data[i];
    q.innerText = d.q;
    opt.innerHTML = "";

    d.o.forEach(x=>{
        let b = document.createElement("button");
        b.innerText = x;

        b.onclick = () => {
            document.querySelectorAll("button").forEach(btn=>btn.disabled=true);

            if(x === d.a){
                b.classList.add("correct");
                score++;
            } else {
                b.classList.add("wrong");
            }

            scoreEl.innerText = "Score: " + score;

            setTimeout(()=>{
                i++;
                if(i < data.length){
                    load();
                } else {
                    q.innerText = "🎉 Completed!";
                    opt.innerHTML = `<h2 style="color:#22c55e">Score: ${score}/${data.length}</h2>`;
                }
            }, 600);
        };

        opt.appendChild(b);
    });

    bar.style.width = (i / data.length) * 100 + "%";
}

function restart(){
    i = 0;
    score = 0;
    scoreEl.innerText = "Score: 0";
    load();
}

load();
</script>

</body>
</html>
